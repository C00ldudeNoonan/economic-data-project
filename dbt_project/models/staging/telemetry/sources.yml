version: 2

sources:
  - name: raw_telemetry
    description: Raw telemetry data
    database: "{{ env_var('BIGQUERY_PROJECT') }}"
    schema: economics_raw
    tables:
      - name: telemetry_events_raw
        description: User interaction events from frontend telemetry system
        columns:
          - name: id
            description: Primary key from SQLite
            tests:
              - not_null
          - name: event_type
            description: Type of event tracked (page_view, chat_query, sign_in, etc.)
          - name: session_id
            description: Session identifier for grouping events
            tests:
              - not_null
          - name: user_id
            description: User ID (nullable for anonymous sessions)
          - name: timestamp_ms
            description: Event timestamp in milliseconds since epoch
            tests:
              - not_null
          - name: properties
            description: JSON string of event-specific properties
          - name: created_at
            description: Database insertion timestamp
          - name: replicated_at
            description: Timestamp when replicated to BigQuery

      - name: users_raw
        description: User account information
        columns:
          - name: id
            description: Primary key
            tests:
              - unique
              - not_null
          - name: email
            description: User email address
            tests:
              - not_null
          - name: password_hash
            description: Hashed password (never in plaintext)
          - name: created_at
            description: Account creation timestamp
          - name: updated_at
            description: Last update timestamp
          - name: replicated_at
            description: Timestamp when replicated to BigQuery
