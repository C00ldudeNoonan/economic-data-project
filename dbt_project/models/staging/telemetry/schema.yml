version: 2

models:
  - name: stg_telemetry_events
    description: Cleaned and parsed telemetry events with extracted properties
    columns:
      - name: id
        description: Primary key from source SQLite table
        tests:
          - unique
          - not_null

      - name: event_type
        description: Type of event tracked
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['page_view', 'navigation_click', 'chat_query', 'example_question_click',
                       'chart_export', 'theme_change', 'filter_applied', 'sign_in', 'sign_up',
                       'sign_out', 'api_error', 'app_error', 'web_vitals']

      - name: session_id
        description: Session identifier for grouping events
        tests:
          - not_null

      - name: event_timestamp
        description: Event timestamp converted from milliseconds
        tests:
          - not_null

      - name: event_date
        description: Event date (truncated to day)
        tests:
          - not_null

      - name: is_error_event
        description: Flag indicating if this is an error event
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_auth_event
        description: Flag indicating if this is an authentication event
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_navigation_event
        description: Flag indicating if this is a navigation event
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_feature_usage_event
        description: Flag indicating if this is a feature usage event
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_performance_event
        description: Flag indicating if this is a performance monitoring event
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

  - name: stg_sessions
    description: Aggregated session-level metrics derived from telemetry events
    columns:
      - name: session_id
        description: Unique session identifier
        tests:
          - unique
          - not_null

      - name: session_start
        description: Timestamp of first event in session
        tests:
          - not_null

      - name: session_end
        description: Timestamp of last event in session
        tests:
          - not_null

      - name: session_date
        description: Date of session start
        tests:
          - not_null

      - name: session_duration_seconds
        description: Duration of session in seconds
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: session_duration_minutes
        description: Duration of session in minutes
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: total_events
        description: Total number of events in session
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

      - name: page_views
        description: Number of page views in session
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: is_authenticated
        description: Whether the session is authenticated
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_bounce
        description: Whether the session was a bounce (single page view)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: has_errors
        description: Whether the session encountered any errors
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: engagement_score
        description: Calculated engagement score (0-7 scale)
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0 and <= 7"
