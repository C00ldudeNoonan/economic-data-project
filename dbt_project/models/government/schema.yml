version: 2

models:
  - name: fred_series_grain
    description: >
      Contains historical real estate gain/loss data from FRED (Federal Reserve Economic Data).
      This table tracks changes in real estate values over time, providing insights into
      market trends and property appreciation/depreciation rates.
    columns:
      - name: series_code
        tests:
          - not_null


  - name: fred_series_latest_aggregates
    description: >
      Aggregated view of the most recent FRED series data points, providing a
      snapshot of current real estate market conditions. This table is updated
      daily with the latest available metrics from various FRED series.
    columns:
      - name: series_code
        tests:
          - not_null


  - name: housing_inventory_and_population
    description: >
      Combines housing inventory data with population statistics to provide
      insights into housing availability relative to population size. This table
      helps analyze housing supply and demand dynamics across different regions.
    columns:
      - name: time_date
        tests:
          - not_null


  - name: housing_inventory_latest_aggregates
    description: >
      Provides the most recent aggregated housing inventory metrics, offering a
      current snapshot of housing availability and market conditions. Updated
      daily with the latest available inventory data.


  - name: housing_inventory
    description: >
      Historical housing inventory data tracking the number of available housing
      units over time. This table serves as the primary source for analyzing
      housing supply trends and seasonal patterns in the market.
    columns:
      - name: time_date
        tests:
          - not_null

  - name: housing_mortgage_rates
    description: >
      Contains historical mortgage rate data from FRED (Federal Reserve Economic Data).
      This table tracks changes in mortgage rates over time, providing insights into
      market trends and interest rate fluctuations. It uses the median sales price data from FRED and performs the calculations to get the mortgage rate and median monthly payment with and without a 20% down payment.
    columns:
      - name: date
        tests:
          - not_null

  - name: fred_quarterly_roc
    description: >
      Contains historical quarterly real estate gain/loss data from FRED (Federal Reserve Economic Data).
      This table tracks changes in real estate values over time, providing insights into
      market trends and property appreciation/depreciation rates.
    columns:
      - name: series_code
        tests:
          - not_null
      - name: month_date
        tests:
          - not_null

  - name: fred_monthly_diff
    description: >
      Monthly FRED economic indicator values with period-over-period change.
      Grain: one row per series_code per month.
      Covers: GDP, CPI, PCE, unemployment rate, Fed funds rate, housing starts,
      industrial production, and 100+ other macro series.
    semantic_model:
      enabled: true
      name: economic_indicators
    agg_time_dimension: observation_date
    columns:
      - name: series_code
        description: FRED series identifier (e.g. UNRATE, FEDFUNDS, CPIAUCSL)
        entity:
          name: fred_series
          type: primary
        dimension:
          type: categorical
        tests:
          - not_null
      - name: date
        granularity: month
        dimension:
          name: observation_date
          type: time
        tests:
          - not_null
      - name: series_name
        description: Human-readable series name
        dimension:
          type: categorical
      - name: data_source
        dimension:
          type: categorical
      - name: value
        description: Series value for the observation period
      - name: period_diff
        description: Absolute month-over-month change in indicator value
    metrics:
      - name: fred_indicator_value
        label: FRED Indicator Value
        description: >
          Current or most-recent value of a FRED economic series.
          Group by series_code or series_name to compare multiple indicators.
        type: simple
        agg: max
        expr: value
      - name: fred_mom_change
        label: FRED Month-over-Month Change
        description: >
          Absolute month-over-month change in FRED indicator value.
          Positive = rising, negative = falling.
        type: simple
        agg: max
        expr: period_diff
