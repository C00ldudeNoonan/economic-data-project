version: 2

models:
  - name: session_summary
    description: Daily aggregated session metrics for tracking engagement and usage patterns
    columns:
      - name: date
        description: Date of the session metrics
        tests:
          - not_null
          - unique
      - name: total_sessions
        description: Total number of sessions on this date
      - name: bounce_rate_pct
        description: Percentage of sessions with only one page view
      - name: avg_engagement_score
        description: Average engagement score (0-7 scale)
      - name: chat_usage_rate_pct
        description: Percentage of sessions that used chat feature

  - name: feature_usage
    description: Daily feature usage metrics showing adoption and engagement per feature
    columns:
      - name: date
        description: Date of the feature usage
        tests:
          - not_null
      - name: event_type
        description: Type of feature event
        tests:
          - not_null
      - name: feature
        description: Name of the feature used
      - name: event_count
        description: Number of times feature was used
      - name: unique_sessions
        description: Number of unique sessions using the feature
      - name: session_penetration_pct
        description: Percentage of total sessions that used this feature

  - name: user_journeys
    description: Page transition analysis showing common user paths and drop-off points
    columns:
      - name: current_page
        description: Starting page of the transition
        tests:
          - not_null
      - name: next_page
        description: Destination page of the transition
        tests:
          - not_null
      - name: transition_count
        description: Number of times this transition occurred
      - name: transition_rate_pct
        description: Percentage of current page visitors who made this transition
      - name: dropoff_category
        description: Drop-off severity category (high/medium/low)

  - name: error_analysis
    description: Error tracking and analysis for identifying and prioritizing issues
    columns:
      - name: date
        description: Date of the error occurrence
        tests:
          - not_null
      - name: event_type
        description: Type of error (api_error or app_error)
        tests:
          - not_null
      - name: error_message
        description: Error message text
      - name: error_code
        description: Error code if available
      - name: page_path
        description: Page where error occurred
      - name: error_count
        description: Number of times this error occurred
      - name: affected_sessions
        description: Number of sessions affected by this error
      - name: severity
        description: Error severity level (critical/high/medium/low)
      - name: impact_level
        description: Impact level based on frequency and reach (high/medium/low)

  - name: performance_metrics
    description: Web Vitals and performance metrics analysis by page
    columns:
      - name: date
        description: Date of the performance measurements
        tests:
          - not_null
      - name: page
        description: Page path being measured
        tests:
          - not_null
      - name: metric_name
        description: Name of the performance metric (LCP, FID, CLS, etc.)
        tests:
          - not_null
      - name: p75_value
        description: 75th percentile value (key metric for Web Vitals)
      - name: overall_rating
        description: Overall performance rating based on Web Vitals thresholds (good/needs-improvement/poor)
      - name: sample_size
        description: Number of measurements
      - name: variability_level
        description: Performance consistency indicator (high/moderate/low variability)
