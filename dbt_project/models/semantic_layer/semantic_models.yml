version: 2

semantic_models:
  - name: cross_asset_daily_volatility
    description: >
      Unified semantic model for querying the shared annualized_volatility_ratio
      metric across stocks, sector ETFs, and input commodities.
    model: ref('cross_asset_daily_volatility')
    defaults:
      agg_time_dimension: trade_date
    entities:
      - name: cross_asset
        type: primary
        expr: asset_id
      - name: stock
        type: foreign
        expr: CASE WHEN asset_class = 'stock' THEN asset_id END
      - name: sector_etf
        type: foreign
        expr: CASE WHEN asset_class = 'sector_etf' THEN asset_id END
      - name: commodity
        type: foreign
        expr: CASE WHEN asset_class = 'commodity' THEN asset_id END
    dimensions:
      - name: trade_date
        type: time
        type_params:
          time_granularity: day
        expr: date
      - name: asset_class
        type: categorical
      - name: symbol
        type: categorical
      - name: exchange
        type: categorical
      - name: commodity_name
        type: categorical
      - name: commodity_unit
        type: categorical
    measures:
      - name: cross_asset_close_price
        agg: max
        expr: current_price
        description: Daily close or spot price for the selected asset.
      - name: cross_asset_price_std_1yr
        agg: average
        expr: std_diff_1yr
        description: 1-year standard deviation of daily price changes.
