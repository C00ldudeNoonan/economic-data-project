version: 2

models:
  - name: time_spine_daily
    description: Daily time spine used by MetricFlow for semantic-layer time joins.
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        description: Calendar date at daily grain.
        granularity: day
        tests:
          - not_null
          - unique

  - name: asset_daily_returns
    description: >
      Normalized daily return fact table across stocks, sector ETFs, factor ETFs, and input
      commodities. Grain: one row per asset per trading day.
    tests:
      - unique_combination:
          arguments:
            combination_of_columns: ['asset_key', 'trade_date']
    columns:
      - name: asset_key
        description: Stable cross-asset identifier prefixed by asset class.
        entity:
          name: asset
          type: primary
        dimension:
          type: categorical
        tests:
          - not_null
      - name: asset_class
        description: Asset class for the normalized instrument.
        dimension:
          type: categorical
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['stock', 'sector_etf', 'factor_etf', 'commodity']
      - name: asset_id
        description: Source identifier for the asset within its asset class.
        dimension:
          type: categorical
        tests:
          - not_null
      - name: asset_name
        description: Display name for the asset.
        dimension:
          type: categorical
        tests:
          - not_null
      - name: symbol
        description: Ticker symbol when the asset is exchange-traded.
        dimension:
          type: categorical
      - name: stock_symbol
        description: Stock ticker symbol for equity rows.
        dimension:
          type: categorical
      - name: sector_etf_symbol
        description: Sector ETF ticker symbol for sector ETF rows.
        dimension:
          type: categorical
      - name: factor_etf_symbol
        description: Factor ETF ticker symbol for factor ETF rows.
        dimension:
          type: categorical
      - name: commodity_name
        description: Commodity name for commodity rows.
        dimension:
          type: categorical
      - name: commodity_unit
        description: Unit of measurement for commodity rows.
        dimension:
          type: categorical
      - name: exchange
        description: Exchange where the asset trades, when applicable.
        dimension:
          type: categorical
      - name: trade_date
        description: Trading date.
        granularity: day
        dimension:
          type: time
        tests:
          - not_null
      - name: current_price
        description: Current close or spot price.
      - name: std_diff_1yr
        description: Standard deviation of daily price differences over the past 1 year.
      - name: pct_change_1yr
        description: Percentage change from 1 year ago to current price.

  - name: current_data_coverage
    description: >
      Current ingestion coverage by raw source. Coverage is anchored to each
      source's latest observed date and measures how many expected entities
      have observations in that source's recent coverage window.
    tests:
      - unique_combination:
          arguments:
            combination_of_columns: ['coverage_id']
    columns:
      - name: coverage_id
        description: Stable identifier for a source coverage snapshot.
        tests:
          - not_null
          - unique
      - name: source_name
        description: Raw source table being evaluated.
        tests:
          - not_null
      - name: source_domain
        description: Business domain for the source.
        tests:
          - not_null
      - name: grain
        description: Expected observation grain for source entities.
        tests:
          - not_null
      - name: coverage_date
        description: Latest observed date in the source.
        tests:
          - not_null
      - name: coverage_window_start
        description: Start date of the rolling coverage window.
      - name: lookback_days
        description: Number of days included in the coverage window.
      - name: expected_entity_count
        description: Distinct entities historically expected for the source.
      - name: observed_entity_count
        description: Distinct expected entities observed in the coverage window.
      - name: missing_entity_count
        description: Expected entities not observed in the coverage window.
      - name: observed_row_count
        description: Rows observed in the coverage window.
      - name: coverage_pct
        description: Ratio of observed entities to expected entities.
        tests:
          - value_in_range:
              arguments:
                min_value: 0
                max_value: 1
      - name: freshness_lag_days
        description: Days between current date and the source coverage date.
      - name: coverage_status
        description: >
          Current coverage health bucket. One of healthy, partial, lagging,
          coverage_gap, stale, or no_expected_entities.
        tests:
          - accepted_values:
              arguments:
                values: ['healthy', 'partial', 'lagging', 'coverage_gap', 'stale', 'no_expected_entities']
      - name: generated_at
        description: Timestamp when the coverage snapshot was generated.

semantic_models:
  - name: asset_daily_returns
    description: >
      Normalized daily return fact table across stocks, sector ETFs, factor ETFs, and input
      commodities. Grain: one row per asset per trading day.
    model: ref('asset_daily_returns')
    defaults:
      agg_time_dimension: trade_date
    entities:
      - name: asset
        type: primary
        expr: asset_key
    dimensions:
      - name: asset_class
        type: categorical
      - name: asset_id
        type: categorical
      - name: asset_name
        type: categorical
      - name: symbol
        type: categorical
      - name: stock_symbol
        type: categorical
      - name: sector_etf_symbol
        type: categorical
      - name: factor_etf_symbol
        type: categorical
      - name: commodity_name
        type: categorical
      - name: commodity_unit
        type: categorical
      - name: exchange
        type: categorical
      - name: trade_date
        type: time
        type_params:
          time_granularity: day
    measures:
      - name: asset_volatility_proxy
        description: Average 1-year standard deviation of daily price changes across normalized assets.
        agg: average
        expr: std_diff_1yr
      - name: annualized_volatility_ratio_measure
        description: >
          Average annualized ratio of daily price-difference volatility to
          current price across normalized stocks, sector ETFs, and commodities.
        agg: average
        expr: std_diff_1yr * sqrt(252) / nullif(current_price, 0)

  - name: current_data_coverage
    description: Current ingestion coverage by raw source.
    model: ref('current_data_coverage')
    defaults:
      agg_time_dimension: coverage_date
    entities:
      - name: coverage_source
        type: primary
        expr: source_name
    dimensions:
      - name: source_name
        type: categorical
      - name: source_domain
        type: categorical
      - name: grain
        type: categorical
      - name: coverage_status
        type: categorical
      - name: coverage_date
        type: time
        type_params:
          time_granularity: day
    measures:
      - name: current_data_coverage_pct_measure
        description: Average current entity coverage percentage across selected sources.
        agg: average
        expr: coverage_pct
      - name: expected_entities_measure
        description: Total expected entities across selected sources.
        agg: sum
        expr: expected_entity_count
      - name: observed_entities_measure
        description: Total observed entities across selected sources in their coverage windows.
        agg: sum
        expr: observed_entity_count
      - name: missing_entities_measure
        description: Total missing entities across selected sources in their coverage windows.
        agg: sum
        expr: missing_entity_count
      - name: freshness_lag_days_measure
        description: Maximum freshness lag in days across selected sources.
        agg: max
        expr: freshness_lag_days

  - name: treasury_yield_curve
    description: >
      Treasury yield curve levels, spreads, and inversion classifications for
      agent and semantic-layer analysis.
    model: ref('agent_treasury_yield_curve_spreads')
    defaults:
      agg_time_dimension: date
    entities:
      - name: yield_curve_observation
        type: primary
        expr: date
    dimensions:
      - name: date
        type: time
        type_params:
          time_granularity: day
      - name: curve_shape
        type: categorical
      - name: inversion_status
        type: categorical
    measures:
      - name: treasury_3m_yield_measure
        description: Average three-month Treasury yield.
        agg: average
        expr: yield_3m
      - name: treasury_2y_yield_measure
        description: Average two-year Treasury yield.
        agg: average
        expr: yield_2y
      - name: treasury_10y_yield_measure
        description: Average ten-year Treasury yield.
        agg: average
        expr: yield_10y
      - name: spread_10y_2y_measure
        description: Average ten-year minus two-year Treasury yield spread.
        agg: average
        expr: spread_10y_2y
      - name: spread_10y_3m_measure
        description: Average ten-year minus three-month Treasury yield spread.
        agg: average
        expr: spread_10y_3m

  - name: financial_conditions
    description: >
      Financial stress, lending standards, and credit delinquency signals built
      from existing FRED financial-condition series.
    model: ref('financial_conditions_signals')
    defaults:
      agg_time_dimension: date
    entities:
      - name: financial_conditions_observation
        type: primary
        expr: date
    dimensions:
      - name: date
        type: time
        type_params:
          time_granularity: day
      - name: nfci_status
        type: categorical
      - name: stl_fsi_status
        type: categorical
      - name: kc_fsi_status
        type: categorical
      - name: nfci_subindex_status
        type: categorical
      - name: nfci_trend_status
        type: categorical
      - name: lending_status
        type: categorical
      - name: lending_size_divergence_status
        type: categorical
      - name: stress_confirmation_status
        type: categorical
    measures:
      - name: nfci_value_measure
        description: Average Chicago Fed National Financial Conditions Index value.
        agg: average
        expr: nfci_value
      - name: nfci_risk_measure
        description: Average NFCI risk sub-index value.
        agg: average
        expr: nfci_risk
      - name: nfci_credit_measure
        description: Average NFCI credit sub-index value.
        agg: average
        expr: nfci_credit
      - name: nfci_leverage_measure
        description: Average NFCI leverage sub-index value.
        agg: average
        expr: nfci_leverage
      - name: anfci_value_measure
        description: Average adjusted National Financial Conditions Index value.
        agg: average
        expr: anfci_value
      - name: stl_fsi_value_measure
        description: Average St. Louis Fed Financial Stress Index value.
        agg: average
        expr: stl_fsi_value
      - name: kc_fsi_value_measure
        description: Average Kansas City Financial Stress Index value.
        agg: average
        expr: kc_fsi_value
      - name: nfci_13w_change_measure
        description: Average 13-week change in NFCI.
        agg: average
        expr: nfci_13w_change
      - name: lending_standards_avg_measure
        description: Average bank lending standards net tightening.
        agg: average
        expr: lending_standards_avg
      - name: credit_card_delinquency_rate_measure
        description: Average credit card delinquency rate.
        agg: average
        expr: cc_delinquency_rate

  - name: credit_market_signals
    description: >
      Daily credit spread signal model covering HY OAS momentum, trailing
      percentiles, moving-average crossover, and BBB-AAA fallen-angel risk.
    model: ref('credit_market_signals')
    defaults:
      agg_time_dimension: date
    entities:
      - name: credit_market_observation
        type: primary
        expr: date
    dimensions:
      - name: date
        type: time
        type_params:
          time_granularity: day
      - name: hy_oas_regime
        type: categorical
      - name: hy_momentum_status
        type: categorical
      - name: bbb_aaa_spread_status
        type: categorical
      - name: hy_percentile_status
        type: categorical
    measures:
      - name: hy_oas_measure
        description: Average ICE BofA US High Yield OAS.
        agg: average
        expr: hy_oas
      - name: bbb_aaa_spread_measure
        description: Average BBB minus AAA corporate OAS spread.
        agg: average
        expr: bbb_aaa_spread
      - name: hy_oas_20d_change_measure
        description: Average 20-trading-day change in HY OAS.
        agg: average
        expr: hy_oas_20d_change
      - name: hy_oas_20d_change_zscore_measure
        description: Average z-score of 20-day HY OAS change versus trailing one year.
        agg: average
        expr: hy_oas_20d_change_zscore
      - name: hy_oas_percentile_5y_measure
        description: Average HY OAS percentile versus trailing five-year distribution.
        agg: average
        expr: hy_oas_percentile_5y
      - name: hy_oas_percentile_10y_measure
        description: Average HY OAS percentile versus trailing ten-year distribution.
        agg: average
        expr: hy_oas_percentile_10y
      - name: hy_oas_bearish_ma_cross_count
        description: Count of bearish HY OAS moving-average crossover observations.
        agg: sum
        expr: hy_oas_bearish_ma_cross_flag

  - name: fomc_sentiment
    description: >
      FOMC hawkish/dovish sentiment scores at meeting and section/speaker grain.
    model: ref('stg_fomc_sentiment_scores')
    defaults:
      agg_time_dimension: meeting_date
    entities:
      - name: fomc_sentiment_score
        type: primary
        expr: score_id
      - name: fomc_transcript
        type: foreign
        expr: transcript_id
      - name: fomc_section
        type: foreign
        expr: section_id
    dimensions:
      - name: meeting_date
        type: time
        type_params:
          time_granularity: day
      - name: speaker
        type: categorical
      - name: scoring_method
        type: categorical
      - name: model_name
        type: categorical
      - name: sentiment_label
        type: categorical
      - name: is_meeting_aggregate
        type: categorical
    measures:
      - name: fomc_hawkish_score_measure
        description: Average FOMC hawkish sentiment score.
        agg: average
        expr: hawkish_score
      - name: fomc_dovish_score_measure
        description: Average FOMC dovish sentiment score.
        agg: average
        expr: dovish_score
      - name: fomc_net_sentiment_score_measure
        description: Average net hawkish-minus-dovish FOMC sentiment score.
        agg: average
        expr: net_sentiment_score
      - name: fomc_sentiment_delta_measure
        description: Average meeting-to-meeting sentiment score delta.
        agg: average
        expr: score_delta
      - name: fomc_sentiment_confidence_measure
        description: Average confidence score for FOMC sentiment extraction.
        agg: average
        expr: confidence

  - name: macro_sentiment_signals
    description: >
      Consumer sentiment, confidence divergence, and manufacturing sentiment
      proxy signals built from existing FRED series.
    model: ref('sentiment_signals')
    defaults:
      agg_time_dimension: date
    entities:
      - name: macro_sentiment_observation
        type: primary
        expr: date
    dimensions:
      - name: date
        type: time
        type_params:
          time_granularity: day
      - name: divergence_status
        type: categorical
      - name: mfg_production_status
        type: categorical
      - name: stagflation_status
        type: categorical
      - name: new_orders_status
        type: categorical
      - name: orders_inventories_status
        type: categorical
    measures:
      - name: consumer_sentiment_measure
        description: Average University of Michigan Consumer Sentiment Index.
        agg: average
        expr: umcsent
      - name: consumer_confidence_measure
        description: Average OECD consumer confidence indicator.
        agg: average
        expr: confidence
      - name: confidence_sentiment_divergence_measure
        description: Average confidence-versus-sentiment z-score divergence.
        agg: average
        expr: confidence_sentiment_divergence
      - name: manufacturing_production_yoy_measure
        description: Average manufacturing production year-over-year change.
        agg: average
        expr: ipman_yoy_pct
      - name: new_orders_yoy_measure
        description: Average manufacturing new orders year-over-year change.
        agg: average
        expr: new_orders_yoy_pct

  - name: net_liquidity_signals
    description: >
      Net liquidity proxy combining Fed balance sheet assets, Treasury General
      Account balances, and reverse repo usage.
    model: ref('net_liquidity_signals')
    defaults:
      agg_time_dimension: date
    entities:
      - name: net_liquidity_observation
        type: primary
        expr: date
    dimensions:
      - name: date
        type: time
        type_params:
          time_granularity: day
      - name: net_liquidity_trend
        type: categorical
      - name: net_liquidity_status
        type: categorical
      - name: rrp_depletion_status
        type: categorical
    measures:
      - name: net_liquidity_measure
        description: Average net liquidity level.
        agg: average
        expr: net_liquidity
      - name: net_liquidity_4w_change_measure
        description: Average four-week net liquidity percent change.
        agg: average
        expr: net_liquidity_4w_pct_change
      - name: net_liquidity_13w_change_measure
        description: Average thirteen-week net liquidity percent change.
        agg: average
        expr: net_liquidity_13w_pct_change
      - name: net_liquidity_zscore_measure
        description: Average net liquidity z-score.
        agg: average
        expr: net_liquidity_zscore
      - name: reverse_repo_usage_measure
        description: Average reverse repo facility usage.
        agg: average
        expr: rrpontsyd

  - name: diffusion_index_signals
    description: >
      Economic breadth diffusion index showing the share of tracked FRED
      indicators that are improving.
    model: ref('diffusion_index_signals')
    defaults:
      agg_time_dimension: date
    entities:
      - name: diffusion_observation
        type: primary
        expr: date
    dimensions:
      - name: date
        type: time
        type_params:
          time_granularity: day
      - name: breadth_trend
        type: categorical
      - name: diffusion_status
        type: categorical
    measures:
      - name: diffusion_pct_measure
        description: Average percentage of tracked indicators improving.
        agg: average
        expr: diffusion_pct
      - name: improving_indicator_count_measure
        description: Average count of improving indicators.
        agg: average
        expr: improving_count
      - name: tracked_indicator_count_measure
        description: Average count of indicators with valid observations.
        agg: average
        expr: total_count
      - name: diffusion_zscore_measure
        description: Average diffusion index z-score.
        agg: average
        expr: diffusion_zscore
      - name: diffusion_3m_change_measure
        description: Average three-month change in diffusion percentage.
        agg: average
        expr: diffusion_3m_change

  - name: fiscal_signals
    description: >
      Fiscal sustainability indicators covering federal debt-to-GDP, interest
      payment growth, and deficit-to-GDP.
    model: ref('fiscal_signals')
    defaults:
      agg_time_dimension: date
    entities:
      - name: fiscal_observation
        type: primary
        expr: date
    dimensions:
      - name: date
        type: time
        type_params:
          time_granularity: day
      - name: debt_level_status
        type: categorical
      - name: debt_trajectory_status
        type: categorical
      - name: interest_burden_status
        type: categorical
      - name: deficit_status
        type: categorical
    measures:
      - name: debt_gdp_pct_measure
        description: Average federal debt as a percentage of GDP.
        agg: average
        expr: debt_gdp_pct
      - name: debt_gdp_1y_change_measure
        description: Average one-year change in debt-to-GDP.
        agg: average
        expr: debt_gdp_1y_change
      - name: interest_payment_measure
        description: Average federal government interest payments.
        agg: average
        expr: interest_payment
      - name: interest_yoy_growth_measure
        description: Average year-over-year growth in federal interest payments.
        agg: average
        expr: interest_yoy_growth
      - name: deficit_gdp_pct_measure
        description: Average federal surplus or deficit as a percentage of GDP.
        agg: average
        expr: deficit_gdp_pct

  - name: housing_signal_indicators
    description: >
      Housing market signals covering starts momentum, permits pipeline,
      mortgage-rate stress, and months of supply.
    model: ref('housing_signals')
    defaults:
      agg_time_dimension: date
    entities:
      - name: housing_signal_observation
        type: primary
        expr: date
    dimensions:
      - name: date
        type: time
        type_params:
          time_granularity: day
      - name: starts_momentum_status
        type: categorical
      - name: permits_pipeline_status
        type: categorical
      - name: mortgage_stress_status
        type: categorical
      - name: supply_status
        type: categorical
    measures:
      - name: housing_starts_yoy_measure
        description: Average housing starts year-over-year percentage change.
        agg: average
        expr: starts_yoy_pct
      - name: permits_starts_ratio_measure
        description: Average building permits to housing starts ratio.
        agg: average
        expr: permits_starts_ratio
      - name: mortgage_rate_measure
        description: Average 30-year fixed mortgage rate.
        agg: average
        expr: avg_mortgage_rate
      - name: housing_months_supply_measure
        description: Average months of new housing supply.
        agg: average
        expr: months_of_supply
      - name: mortgage_3m_change_measure
        description: Average three-month change in mortgage rates.
        agg: average
        expr: mortgage_3m_change

  - name: factor_sector_relationships
    description: >
      Latest rolling correlation and relative performance between US equity
      factor ETFs and sector, broad market, style, and thematic ETFs.
    model: ref('factor_sector_correlation')
    defaults:
      agg_time_dimension: as_of_date
    entities:
      - name: factor_sector_pair
        type: primary
        expr: factor_sector_key
    dimensions:
      - name: as_of_date
        type: time
        type_params:
          time_granularity: day
      - name: factor_symbol
        type: categorical
      - name: factor_name
        type: categorical
      - name: comparison_symbol
        type: categorical
      - name: comparison_name
        type: categorical
      - name: comparison_universe
        type: categorical
      - name: sector_symbol
        type: categorical
      - name: sector_name
        type: categorical
    measures:
      - name: factor_sector_corr_3mo_measure
        description: Average rolling 3-month daily-return correlation between selected factors and comparison ETFs.
        agg: average
        expr: corr_3mo
      - name: factor_sector_corr_1yr_measure
        description: Average rolling 1-year daily-return correlation between selected factors and comparison ETFs.
        agg: average
        expr: corr_1yr
      - name: factor_return_3mo_measure
        description: Average selected factor ETF 3-month return.
        agg: average
        expr: factor_return_3mo
      - name: factor_return_1yr_measure
        description: Average selected factor ETF 1-year return.
        agg: average
        expr: factor_return_1yr
      - name: factor_sector_return_spread_3mo_measure
        description: Average factor-minus-comparison 3-month return spread.
        agg: average
        expr: factor_sector_return_spread_3mo
      - name: factor_sector_return_spread_1yr_measure
        description: Average factor-minus-comparison 1-year return spread.
        agg: average
        expr: factor_sector_return_spread_1yr

metrics:
  - name: asset_volatility_proxy
    label: Asset Price Volatility (1-Year StdDev)
    description: Average 1-year standard deviation of daily price changes across normalized assets.
    type: simple
    type_params:
      measure:
        name: asset_volatility_proxy
  - name: annualized_volatility_ratio
    label: Annualized Volatility Ratio
    description: >
      Average annualized ratio of daily price-difference volatility to current
      price across normalized stocks, sector ETFs, and commodities. Higher =
      more volatile relative to price level.
    type: simple
    type_params:
      measure:
        name: annualized_volatility_ratio_measure
  - name: current_data_coverage_pct
    label: Current Data Coverage %
    description: Average current entity coverage percentage across selected raw sources.
    type: simple
    type_params:
      measure:
        name: current_data_coverage_pct_measure
  - name: expected_entities
    label: Expected Entities
    description: Total expected entities across selected raw sources.
    type: simple
    type_params:
      measure:
        name: expected_entities_measure
  - name: observed_entities
    label: Observed Entities
    description: Total observed entities across selected raw sources in their coverage windows.
    type: simple
    type_params:
      measure:
        name: observed_entities_measure
  - name: missing_entities
    label: Missing Entities
    description: Total missing entities across selected raw sources in their coverage windows.
    type: simple
    type_params:
      measure:
        name: missing_entities_measure
  - name: max_freshness_lag_days
    label: Max Freshness Lag Days
    description: Maximum freshness lag in days across selected raw sources.
    type: simple
    type_params:
      measure:
        name: freshness_lag_days_measure
  - name: treasury_3m_yield
    label: Treasury 3M Yield
    description: Average three-month Treasury yield.
    type: simple
    type_params:
      measure:
        name: treasury_3m_yield_measure
  - name: treasury_2y_yield
    label: Treasury 2Y Yield
    description: Average two-year Treasury yield.
    type: simple
    type_params:
      measure:
        name: treasury_2y_yield_measure
  - name: treasury_10y_yield
    label: Treasury 10Y Yield
    description: Average ten-year Treasury yield.
    type: simple
    type_params:
      measure:
        name: treasury_10y_yield_measure
  - name: treasury_10y_2y_spread
    label: Treasury 10Y-2Y Spread
    description: Average ten-year minus two-year Treasury yield spread.
    type: simple
    type_params:
      measure:
        name: spread_10y_2y_measure
  - name: treasury_10y_3m_spread
    label: Treasury 10Y-3M Spread
    description: Average ten-year minus three-month Treasury yield spread.
    type: simple
    type_params:
      measure:
        name: spread_10y_3m_measure
