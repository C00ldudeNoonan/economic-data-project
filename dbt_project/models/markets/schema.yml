    columns:
      - name: symbol
        tests:
          - not_null
      - name: time_period
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['12_weeks', '6_months', '1_year', '5_years']
      - name: volatility_pct
        tests:
          - value_in_range:
              min_value: 0
      - name: win_rate_pct
        tests:
          - value_in_range:
              min_value: 0
              max_value: 100

  - name: us_sector_summary
