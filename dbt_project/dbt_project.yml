name: "dbt_project"
version: "1.0.0"
config-version: 2
profile: "econ_database"

# Directory configurations
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
    - "target"
    - "dbt_packages"

# Model configurations
# Schema values map to BigQuery datasets. generate_schema_name macro must
# return the custom schema as-is (see macros/generate_schema_name.sql).
models:
  dbt_project:
    +materialized: table
    staging:
      +schema: economics_staging
      +materialized: view
    markets:
      +schema: economics_marts
      +materialized: table
    commodities:
      +schema: economics_marts
      +materialized: table
    government:
      +schema: economics_marts
      +materialized: table
    signals:
      +schema: economics_signals
      +materialized: table
    semantic_layer:
      +schema: economics_marts
      +materialized: table
    agents_preprocess:
      +schema: economics_analysis
      +materialized: view
    data_quality:
      +schema: economics_staging
      +materialized: table
    analysis:
      +schema: economics_analysis
      +materialized: table
    backtesting:
      +schema: economics_backtesting
      +materialized: incremental
      +file_format: iceberg
      +catalog: iceberg_catalog
