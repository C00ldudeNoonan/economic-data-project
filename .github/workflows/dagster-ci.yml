name: Dagster CI

on:
  push:
    branches: [main, develop]
    paths:
      - "macro_agents/**"
      - "dbt_project/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "macro_agents/**"
      - "dbt_project/**"

jobs:
  test:
    name: Test Dagster
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-dagster-${{ hashFiles('macro_agents/pyproject.toml', 'macro_agents/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-dagster-

      - name: Install dependencies with uv
        run: |
          cd macro_agents
          uv sync --extra dev

      - name: Lint with ruff
        run: |
          cd macro_agents
          uv run ruff check . --exclude .claude
          uv run ruff format --check . --exclude .claude

      - name: Typecheck with ty
        run: |
          cd macro_agents
          uv run ty check --extra-search-path src src/macro_agents

      - name: Test Dagster definitions
        run: |
          cd macro_agents
          uv run dg check defs

      - name: Test with pytest
        run: |
          cd macro_agents
          uv run pytest tests/ -v -m "not skip_ci"
