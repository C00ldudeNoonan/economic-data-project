data_platform_manifest:
  version: '1.1'
  database: MotherDuck (DuckDB)
  schema: main
  instructions:
    overview: This is a multi-layered economic and financial data platform. Data flows from raw sources through staging, quality
      checks, domain models, analysis, and finally agent-ready views. Always prefer higher-tier tables over lower-tier ones.
    query_priority:
    - 'TIER 1 (PREFERRED): Agent-preprocessed views and signals — cleaned, unified, quality-checked'
    - 'TIER 2 (AVAILABLE): Analysis and domain models — processed with tests but may need joins'
    - 'TIER 3 (RAW): Staging/source tables — only when processed data lacks needed granularity'
    confidence_ratings:
      description: Each table has a confidence rating based on dbt test coverage. Prefer tables with higher confidence when
        multiple options exist.
      high: 5+ weighted test points — well-validated with multiple test types (uniqueness, accepted values, OHLC consistency,
        etc.)
      medium: 2-4 weighted test points — basic validation (typically not_null checks)
      low: 1 weighted test point — minimal validation
      untested: No dbt tests defined — use with caution, cross-reference with tested tables
    time_periods:
      performance_summaries:
      - 12_weeks
      - 6_months
      - 1_year
      - 5_years
      rolling_windows:
      - 1_month
      - 3_months
      - 6_months
      - 9_months
      - 1_year
      signal_frequencies:
        daily: market technicals, breadth, volatility, cross-asset
        weekly: net liquidity, treasury yields
        monthly: economic indicators, regime, sentiment, labor, housing, inflation
        quarterly: fiscal signals, GDP
    tips:
    - Filter agent_market_performance by market_category ('sector' or 'major_index') and time_period
    - Filter agent_commodity_performance by commodity_category ('energy', 'agriculture', 'input') and time_period
    - 'Signal tables have _status columns with severity: ''high'', ''medium'', ''low'', ''normal'''
    - For point-in-time historical analysis, use _snapshot tables to avoid look-ahead bias
    - 'economic_regime_classification values: Expansion, Slowdown, Contraction, Recovery'
    - Use data_quality_anomalies to check for known data issues before drawing conclusions
    - FRED series are identified by series_code (e.g., 'CPIAUCSL', 'UNRATE', 'GDP')
    - 'Sector ETFs: XLK (Tech), XLF (Financials), XLE (Energy), XLV (Health), XLY (Cons Disc), XLP (Cons Staples), XLI (Industrials),
      XLB (Materials), XLRE (Real Estate), XLC (Comms), XLU (Utilities)'
  test_coverage_summary:
    total_models: 130
    by_confidence:
      high: 25
      medium: 42
      low: 43
      untested: 20
    untested_models:
    - agent_commodity_performance_snapshot
    - agent_financial_conditions_index
    - agent_fred_monthly_diff
    - agent_fred_series_latest_aggregates_snapshot
    - agent_housing_inventory_latest_aggregates
    - agent_housing_mortgage_rates
    - agent_leading_econ_return_indicator_snapshot
    - agent_market_performance_snapshot
    - agent_reddit_posts_daily
    - agent_reddit_sentiment_trends
    - agent_treasury_yield_curve_spreads
    - commodity_market_signals
    - housing_inventory_latest_aggregates
    - reddit_cross_subreddit_activity
    - reddit_thread_structure
    - stg_fomc_meeting_summaries
    - stg_fomc_meetings_enhanced
    - stg_fomc_transcripts
    - stg_transcript_sections
    - stg_transcript_topics
    by_layer:
      agents_preprocess: 4/15 models tested (27%), 12 total checks
      analysis: 13/16 models tested (81%), 41 total checks
      analysis/dispersion: 2/2 models tested (100%), 5 total checks
      analytics/telemetry: 5/5 models tested (100%), 11 total checks
      backtesting: 6/6 models tested (100%), 12 total checks
      commodities: 6/6 models tested (100%), 30 total checks
      data_quality: 5/5 models tested (100%), 27 total checks
      government: 7/8 models tested (88%), 9 total checks
      markets: 13/13 models tested (100%), 57 total checks
      signals: 17/17 models tested (100%), 19 total checks
      staging: 30/35 models tested (86%), 111 total checks
      staging/telemetry: 2/2 models tested (100%), 38 total checks
  tier_1_preferred:
    description: Cleaned, unified, quality-checked tables optimized for AI consumption. Use these first.
    agent_views:
      market_data:
      - table: agent_market_performance
        description: Unified market performance across sectors and major indices
        use_when: Asking about stock market returns, sector performance, or index performance
        key_columns:
        - symbol
        - ticker
        - name
        - time_period
        - market_category
        - total_return_pct
        - avg_daily_return_pct
        - volatility_pct
        - annualized_volatility_pct
        - win_rate_pct
        - best_day_pct_change
        - worst_day_pct_change
        - period_start_price
        - period_end_price
        filter_by:
          market_category:
          - sector
          - major_index
          time_period:
          - 12_weeks
          - 6_months
          - 1_year
          - 5_years
        confidence: high
        test_coverage:
          total_tests: 5
          test_types:
          - accepted_values
          - not_null
          tested_columns:
          - market_category
          - symbol
          - time_period
      - table: agent_commodity_performance
        description: Unified commodity performance across energy, agriculture, and industrial inputs
        use_when: Asking about commodity prices, returns, or volatility
        key_columns:
        - commodity_name
        - commodity
        - commodity_unit
        - time_period
        - commodity_category
        - total_return_pct
        - volatility_pct
        - annualized_volatility_pct
        - win_rate_pct
        - best_day_pct_change
        - worst_day_pct_change
        - period_start_price
        - period_end_price
        filter_by:
          commodity_category:
          - energy
          - agriculture
          - input
          time_period:
          - 12_weeks
          - 6_months
          - 1_year
          - 5_years
        confidence: high
        test_coverage:
          total_tests: 5
          test_types:
          - accepted_values
          - not_null
          tested_columns:
          - commodity_category
          - commodity_name
          - time_period
      - table: agent_treasury_yield_curve_spreads
        description: Treasury yield curve with key spreads and inversion detection
        use_when: Asking about interest rates, yield curve, or recession signals from bonds
        key_columns:
        - date
        - yield_1m
        - yield_3m
        - yield_6m
        - yield_1y
        - yield_2y
        - yield_5y
        - yield_10y
        - yield_20y
        - yield_30y
        - spread_10y_2y
        - spread_10y_3m
        - spread_2y_3m
        - spread_30y_2y
        - curve_shape
        - inversion_status
        filter_by:
          curve_shape:
          - Steep
          - Normal
          - Flat
          - Inverted
          inversion_status:
          - Inverted
          - Normal
        confidence: untested
        test_coverage:
          total_tests: 0
      economic_data:
      - table: agent_fred_series_latest_aggregates
        description: Latest snapshot of all FRED economic indicators with percentage changes
        use_when: Asking about current economic data values or recent changes in indicators
        key_columns:
        - series_code
        - series_name
        - month
        - current_value
        - pct_change_3m
        - pct_change_6m
        - pct_change_1y
        - date_grain
        confidence: low
        test_coverage:
          total_tests: 1
          test_types:
          - not_null
          tested_columns:
          - series_code
      - table: agent_fred_monthly_diff
        description: FRED economic series with month-over-month differences
        use_when: Analyzing trends or direction of economic indicators over time
        key_columns:
        - series_code
        - series_name
        - date
        - value
        - period_diff
        - data_source
        confidence: untested
        test_coverage:
          total_tests: 0
      - table: agent_financial_conditions_index
        description: Financial conditions composite index with sub-scores
        use_when: Assessing overall financial stress or tightness
        key_columns:
        - date
        - fci
        - equity_score
        - housing_score
        - treasury_10yr_score
        confidence: untested
        test_coverage:
          total_tests: 0
      - table: agent_housing_inventory_latest_aggregates
        description: Latest housing inventory metrics with percentage changes
        use_when: Asking about housing supply, inventory levels, or housing market conditions
        key_columns:
        - series_code
        - series_name
        - month
        - current_value
        - pct_change_3m
        - pct_change_6m
        - pct_change_1y
        - date_grain
        confidence: untested
        test_coverage:
          total_tests: 0
      - table: agent_housing_mortgage_rates
        description: Mortgage rates with monthly payment calculations at different down payments
        use_when: Asking about mortgage rates, housing affordability, or payment estimates
        key_columns:
        - date
        - mortgage_rate
        - median_price_no_down_payment
        - median_price_20_pct_down_payment
        - monthly_payment_no_down_payment
        - monthly_payment_20_pct_down_payment
        confidence: untested
        test_coverage:
          total_tests: 0
      - table: agent_leading_econ_return_indicator
        description: Correlation analysis of economic indicator changes vs future stock returns
        use_when: Asking which economic indicators predict market returns or about economic-market relationships
        key_columns:
        - symbol
        - series_name
        - analysis_type
        - economic_category
        confidence: low
        test_coverage:
          total_tests: 1
          test_types:
          - not_null
          tested_columns:
          - symbol
      sentiment_data:
      - table: agent_reddit_sentiment_trends
        description: Daily sentiment trends by subreddit with rolling averages
        use_when: Asking about market sentiment, retail investor mood, or social media trends
        key_columns:
        - date
        - subreddit
        - avg_score
        - total_posts
        - weekly_avg_score
        - score_momentum_pct
        - avg_vader_sentiment
        - pct_positive
        - pct_negative
        - sentiment_momentum
        - sentiment_trend
        filter_by:
          subreddit:
          - investing
          - stocks
          - wallstreetbets
          - economics
          - economy
          sentiment_trend:
          - increasing
          - decreasing
          - stable
        confidence: untested
        test_coverage:
          total_tests: 0
      - table: agent_reddit_posts_daily
        description: Daily Reddit posts with engagement metrics
        use_when: Looking at specific Reddit discussions or top posts
        key_columns:
        - title
        - score
        - num_comments
        - subreddit
        - author
        - url
        - partition_date
        confidence: untested
        test_coverage:
          total_tests: 0
      historical_snapshots:
      - table: agent_market_performance_snapshot
        description: Monthly point-in-time snapshots of market performance
        use_when: Backtesting or analyzing what was known at a specific past date
        key_columns:
        - snapshot_date
        - symbol
        - market_category
        - time_period
        - total_return_pct
        confidence: untested
        test_coverage:
          total_tests: 0
      - table: agent_commodity_performance_snapshot
        description: Monthly point-in-time snapshots of commodity performance
        use_when: Backtesting commodity strategies or historical commodity analysis
        key_columns:
        - snapshot_date
        - commodity_name
        - commodity_category
        - time_period
        - total_return_pct
        confidence: untested
        test_coverage:
          total_tests: 0
      - table: agent_fred_series_latest_aggregates_snapshot
        description: Monthly point-in-time snapshots of FRED economic data
        use_when: Backtesting economic analysis or comparing what was known at different dates
        key_columns:
        - snapshot_date
        - series_code
        - series_name
        - current_value
        - pct_change_3m
        confidence: untested
        test_coverage:
          total_tests: 0
      - table: agent_leading_econ_return_indicator_snapshot
        description: Monthly snapshots of economic-market correlation data
        use_when: Analyzing how economic-market relationships evolved over time
        key_columns:
        - snapshot_date
        - symbol
        - series_name
        confidence: untested
        test_coverage:
          total_tests: 0
    signal_models:
      description: 'Daily/weekly/monthly signal tables with severity-rated status columns. Each signal has a _status column
        rated: high (alert), medium (watch), low (note), normal. Use these to assess current market and economic conditions.'
      macroeconomic_signals:
      - table: inflation_signals
        frequency: monthly
        description: CPI momentum, Core PCE vs 2% target, breakeven inflation spreads
        key_columns:
        - date
        - cpi_3m_annualized
        - cpi_12m_yoy
        - cpi_momentum_spread
        - core_pce_yoy
        - pce_deviation_from_target
        - breakeven_5y_10y_spread
        - cpi_momentum_status
        - core_pce_status
        - breakeven_status
        confidence: medium
        test_coverage:
          total_tests: 2
          test_types:
          - not_null
          tested_columns:
          - cpi_momentum_status
          - date
      - table: labor_signals
        frequency: monthly
        description: Job openings/unemployed ratio, Sahm Rule, initial claims, quits rate
        key_columns:
        - date
        - jo_unemployed_ratio
        - sahm_approx
        - jo_ratio_status
        - claims_trend_status
        - sahm_approx_status
        - quits_trend_status
        confidence: medium
        test_coverage:
          total_tests: 2
          test_types:
          - not_null
          tested_columns:
          - date
          - jo_ratio_status
      - table: housing_signals
        frequency: monthly
        description: Housing starts momentum, permits pipeline, mortgage stress, months of supply
        key_columns:
        - date
        - starts_yoy_pct
        - permits_starts_ratio
        - avg_mortgage_rate
        - months_of_supply
        - starts_momentum_status
        - permits_pipeline_status
        - mortgage_stress_status
        - supply_status
        confidence: low
        test_coverage:
          total_tests: 1
          test_types:
          - not_null
          tested_columns:
          - date
      - table: financial_conditions_signals
        frequency: weekly/monthly
        description: NFCI level/trend, bank lending standards, credit sub-indices, financial stress
        key_columns:
        - date
        - nfci_value
        - nfci_credit
        - nfci_leverage
        - anfci_value
        - stl_fsi_value
        - lending_standards_avg
        - cc_delinquency_rate
        - nfci_status
        - nfci_trend_status
        - lending_status
        confidence: low
        test_coverage:
          total_tests: 1
          test_types:
          - not_null
          tested_columns:
          - date
      - table: liquidity_signals
        frequency: monthly
        description: M2 money supply growth, business loans, consumer credit
        key_columns:
        - date
        - m2_yoy_growth
        - m2_3m_annualized
        - busloans_yoy_growth
        - m2_growth_status
        - busloans_growth_status
        - consumer_credit_status
        confidence: low
        test_coverage:
          total_tests: 1
          test_types:
          - not_null
          tested_columns:
          - date
      - table: sentiment_signals
        frequency: monthly
        description: Consumer confidence vs sentiment divergence, ISM PMI, stagflation indicator
        key_columns:
        - date
        - umcsent
        - confidence
        - pmi
        - ism_inventories
        - confidence_sentiment_divergence
        - orders_prices_spread
        - orders_inventories_spread
        - divergence_status
        - pmi_status
        - stagflation_status
        - new_orders_status
        - orders_inventories_status
        confidence: low
        test_coverage:
          total_tests: 1
          test_types:
          - not_null
          tested_columns:
          - date
      - table: fiscal_signals
        frequency: quarterly
        description: Debt-to-GDP, interest payment burden, deficit-to-GDP
        key_columns:
        - date
        - debt_gdp_pct
        - debt_gdp_1y_change
        - interest_payment
        - interest_yoy_growth
        - deficit_gdp_pct
        - debt_level_status
        - debt_trajectory_status
        - interest_burden_status
        - deficit_status
        confidence: low
        test_coverage:
          total_tests: 1
          test_types:
          - not_null
          tested_columns:
          - date
      - table: trade_signals
        frequency: monthly
        description: Dollar momentum (broad + EM), trade balance, EM stress
        key_columns:
        - date
        - dollar_broad_avg
        - em_dollar_avg
        - trade_balance
        - dollar_3m_pct_change
        - dollar_12m_pct_change
        - em_broad_divergence
        - dollar_momentum_status
        - trade_deficit_status
        - em_stress_status
        confidence: low
        test_coverage:
          total_tests: 1
          test_types:
          - not_null
          tested_columns:
          - date
      - table: economic_acceleration_signals
        frequency: monthly
        description: Second derivatives of payrolls, CPI, GDP — catches inflection points 3-6 months early
        key_columns:
        - date
        - payems_mom_pct
        - payems_acceleration
        - payems_consecutive_negative
        - cpi_acceleration
        - gdp_acceleration
        - composite_accel_zscore
        - payems_accel_status
        - cpi_accel_status
        - gdp_accel_status
        confidence: low
        test_coverage:
          total_tests: 1
          test_types:
          - not_null
          tested_columns:
          - date
      - table: net_liquidity_signals
        frequency: weekly
        description: Fed balance sheet net liquidity (WALCL - TGA - RRP), proxy for market liquidity
        key_columns:
        - date
        - walcl
        - wtregen
        - rrpontsyd
        - net_liquidity
        - net_liquidity_4w_avg
        - net_liquidity_13w_avg
        - net_liquidity_zscore
        - net_liquidity_trend
        - net_liquidity_status
        - rrp_depletion_status
        confidence: low
        test_coverage:
          total_tests: 1
          test_types:
          - not_null
          tested_columns:
          - date
      - table: diffusion_index_signals
        frequency: monthly
        description: Breadth of economic improvement across 20 FRED indicators
        key_columns:
        - date
        - total_count
        - improving_count
        - diffusion_pct
        - diffusion_6m_avg
        - diffusion_zscore
        - breadth_trend
        - diffusion_status
        confidence: low
        test_coverage:
          total_tests: 1
          test_types:
          - not_null
          tested_columns:
          - date
      market_technical_signals:
      - table: momentum_signals
        frequency: daily
        description: Time-series momentum, dual momentum allocation, Faber TAA, sector rotation, trend score
        key_columns:
        - date
        - tsmom_return
        - tsmom_signal
        - dual_momentum_position
        - faber_invested_count
        - sector_dispersion
        - top_sector
        - bottom_sector
        - trend_score
        - tsmom_status
        - dual_momentum_status
        - faber_taa_status
        - sector_rotation_status
        - trend_score_status
        confidence: low
        test_coverage:
          total_tests: 1
          test_types:
          - not_null
          tested_columns:
          - date
      - table: market_breadth_signals
        frequency: daily
        description: 'S&P 500 breadth: % above moving averages, McClellan Oscillator, Zweig Thrust, sector participation'
        key_columns:
        - date
        - pct_above_200_ma
        - pct_above_50_ma
        - ad_ratio
        - mcclellan_oscillator
        - mcclellan_summation_index
        - zweig_thrust_signal
        - breadth_divergence_signal
        - sector_participation_pct
        - avg_pair_correlation_63d
        - return_dispersion
        confidence: low
        test_coverage:
          total_tests: 1
          test_types:
          - not_null
          tested_columns:
          - date
      - table: market_volatility_signals
        frequency: daily
        description: VIX statistics, realized volatility (SPY/QQQ), Parkinson/Garman-Klass estimators, variance risk premium
        key_columns:
        - date
        - vix_close
        - vix_avg_20d
        - spy_realized_vol_20d
        - qqq_realized_vol_20d
        - spy_parkinson_vol_20d
        - spy_gk_vol_20d
        - spy_vrp_20d
        - spy_vrp_30d
        confidence: low
        test_coverage:
          total_tests: 1
          test_types:
          - not_null
          tested_columns:
          - date
      - table: technical_signals
        frequency: daily
        description: RSI(14/2), Bollinger Bands with squeeze detection, z-score, VIX percentile rank
        key_columns:
        - date
        - adj_close
        - rsi_14
        - rsi_2
        - bb_bandwidth
        - bb_bandwidth_pctile
        - bb_position
        - zscore_60d
        - vix_percentile_1yr
        - vix_zscore
        - rsi_status
        - bollinger_status
        - zscore_status
        - vix_mean_reversion_status
        confidence: low
        test_coverage:
          total_tests: 1
          test_types:
          - not_null
          tested_columns:
          - date
      - table: cross_asset_divergences
        frequency: daily
        description: 'Cross-asset divergence flags: HY-equity, stock-bond correlation, defensive/cyclical ratio, gold-real
          yield, small/large cap, copper/gold, Dow Theory, semis leadership'
        key_columns:
        - date
        - hy_equity_divergence_flag
        - hy_spread_divergence_flag
        - stock_bond_corr_regime
        - defensive_ratio_uptrend_flag
        - gold_real_residual_zscore
        - iwm_spy_ratio
        - rsp_spy_ratio
        - copper_gold_ratio
        - aud_risk_divergence_flag
        - dow_non_confirmation_flag
        - semis_divergence_flag
        confidence: low
        test_coverage:
          total_tests: 1
          test_types:
          - not_null
          tested_columns:
          - date
      - table: factor_signals
        frequency: daily
        description: Value/Growth ratio (IWD/IWF) and Small/Large cap ratio (IWM/SPY) with moving averages
        key_columns:
        - date
        - iwd_iwf_ratio
        - iwd_iwf_sma_50
        - iwd_iwf_sma_200
        - iwm_spy_ratio
        - iwm_spy_sma_50
        - iwm_spy_sma_200
        confidence: low
        test_coverage:
          total_tests: 1
          test_types:
          - not_null
          tested_columns:
          - date
  tier_2_available:
    description: Processed analytical models with dbt tests. Use when agent views lack needed detail.
    economic_regime_analysis:
    - table: economic_regime_classification
      description: 'Monthly regime: Expansion, Slowdown, Contraction, Recovery based on growth/employment/inflation/financial
        conditions'
      key_columns:
      - month_date
      - regime
      confidence: medium
      test_coverage:
        total_tests: 3
        test_types:
        - accepted_values
        - not_null
        tested_columns:
        - month_date
        - regime
    - table: factor_tilts
      description: Recommended factor tilts (value, momentum, quality, low_vol, size) by economic regime
      key_columns:
      - month_date
      - regime
      - value_tilt
      - momentum_tilt
      - quality_tilt
      - low_vol_tilt
      - size_tilt
      - notes
      confidence: medium
      test_coverage:
        total_tests: 3
        test_types:
        - accepted_values
        - not_null
        tested_columns:
        - month_date
        - regime
    - table: sector_regime_performance
      description: Historical sector returns/volatility/win rates by economic regime
      key_columns:
      - symbol
      - regime
      confidence: medium
      test_coverage:
        total_tests: 2
        test_types:
        - not_null
        tested_columns:
        - regime
        - symbol
    sector_sensitivity:
    - table: sector_indicator_sensitivity
      description: Rolling correlations between FRED indicators and sector ETF returns with lag analysis
      key_columns:
      - symbol
      - series_code
      - sensitivity_score
      confidence: medium
      test_coverage:
        total_tests: 2
        test_types:
        - not_null
        tested_columns:
        - series_code
        - symbol
    - table: sector_sensitivity_summary
      description: Aggregated sector-indicator sensitivity rankings and percentiles
      key_columns:
      - symbol
      - series_code
      confidence: medium
      test_coverage:
        total_tests: 2
        test_types:
        - not_null
        tested_columns:
        - series_code
        - symbol
    - table: ticker_sector_sensitivity
      description: Individual stock -> GICS sector -> sector ETF -> macro sensitivity mapping
      key_columns:
      - symbol
      - company_name
      - gics_sector
      - sub_industry
      - sector_etf
      - avg_sensitivity_score
      - macro_exposure_level
      - top_sensitive_indicators
      - sector_type
      confidence: high
      test_coverage:
        total_tests: 6
        test_types:
        - accepted_values
        - not_null
        - unique
        tested_columns:
        - gics_sector
        - macro_exposure_level
        - sector_etf
        - sector_type
